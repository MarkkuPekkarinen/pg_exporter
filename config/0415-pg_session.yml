#==============================================================#
# 0415 pg_session
#==============================================================#
pg_session:
  name: pg_session
  desc: PostgreSQL client session age snapshot histograms by database and state
  query: |-
    SELECT datname,
           state,
           CASE
             WHEN state = 'active' AND query_start IS NOT NULL
             THEN greatest(0, extract(epoch FROM statement_timestamp() - query_start))
           END AS query_age_seconds,
           CASE
             WHEN xact_start IS NOT NULL
             THEN greatest(0, extract(epoch FROM statement_timestamp() - xact_start))
           END AS xact_age_seconds,
           CASE
             WHEN backend_start IS NOT NULL
             THEN greatest(0, extract(epoch FROM statement_timestamp() - backend_start))
           END AS age_seconds,
           CASE
             WHEN backend_xid IS NOT NULL OR backend_xmin IS NOT NULL
             THEN greatest(
               0,
               coalesce(age(backend_xid), 0),
               coalesce(age(backend_xmin), 0)
             )
           END AS xid_age
    FROM pg_stat_activity
    WHERE pid <> pg_backend_pid()
      AND backend_type = 'client backend'
      AND datname IS NOT NULL;
  ttl: 10
  min_version: 100000
  tags: [ cluster ]
  metrics:
    - datname:           { usage: LABEL     ,description: "Name of the database this backend is connected to" }
    - state:             { usage: LABEL     ,description: "Current overall state of this backend" }
    # Shared age buckets: compact 1-3-10 logarithmic grid from 10ms to about 35d.
    - query_age_seconds: { usage: HISTOGRAM ,bucket: [0.01, 0.03, 0.1, 0.3, 1, 3, 10, 30, 100, 300, 1000, 3000, 10000, 30000, 100000, 300000, 1000000, 3000000] ,description: "Current active query age snapshot in seconds" }
    - xact_age_seconds:  { usage: HISTOGRAM ,bucket: [0.01, 0.03, 0.1, 0.3, 1, 3, 10, 30, 100, 300, 1000, 3000, 10000, 30000, 100000, 300000, 1000000, 3000000] ,description: "Current transaction age snapshot in seconds" }
    - age_seconds:       { usage: HISTOGRAM ,bucket: [0.01, 0.03, 0.1, 0.3, 1, 3, 10, 30, 100, 300, 1000, 3000, 10000, 30000, 100000, 300000, 1000000, 3000000] ,description: "Current client session age snapshot in seconds" }
    # XID age uses a compact 1-2-5 logarithmic risk grid; policy thresholds stay outside the bucket lattice.
    - xid_age:           { usage: HISTOGRAM ,bucket: [1000000, 2000000, 5000000, 10000000, 20000000, 50000000, 100000000, 200000000, 500000000, 1000000000, 2000000000] ,description: "Current backend oldest XID horizon age snapshot in transactions" }
